<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <button id="theme-toggle" class="theme-toggle-btn">Dark Mode</button>
    <main>
      <div class="cinnamoroll-container">
        <img src="image.png" alt="Cinnamoroll Header" class="header-image">
        <div class="cinnamoroll-character">
          <!-- Character Placeholder -->
          <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHlxNnp0ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6ZzZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/uA8vH97Zt7X3L7U0aE/giphy.gif" alt="Cinnamoroll Typing" class="character-gif">
        </div>
        <div class="editor-window">
          <div class="editor-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span class="file-name">cinnamoroll.js</span>
          </div>
          <div id="code-output" class="editor-body">
            <!-- Code will be typed here -->
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
